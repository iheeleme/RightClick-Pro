name: Package macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: Test package version
        required: true
        type: string
        default: 0.1.0-test.1
      configuration:
        description: Swift/Xcode build configuration
        required: true
        type: choice
        default: release
        options:
          - release
          - debug
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/package-macos.yml"
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"
      - "scripts/**"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: package-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package macOS (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            artifact_suffix: arm64
          - runner: macos-26-intel
            artifact_suffix: x86_64

    env:
      BUILD_CONFIGURATION: ${{ inputs.configuration || 'release' }}
      RIGHTCLICKPRO_VERSION: ${{ inputs.version || '' }}
      RIGHTCLICKPRO_PACKAGE_DMG: "1"
      ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Run Swift checks
        run: scripts/ci-swift-check.sh "$BUILD_CONFIGURATION"

      - name: Package macOS artifact
        run: scripts/package-macos.sh "$BUILD_CONFIGURATION"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: RightClick Pro-${{ env.ARTIFACT_SUFFIX }}-${{ inputs.version || github.ref_name }}
          path: dist/*.dmg
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          assets=(release-assets/*.dmg)
          if (( ${#assets[@]} == 0 )); then
            echo "No DMG assets downloaded from package jobs." >&2
            exit 66
          fi

          version="${GITHUB_REF_NAME#v}"
          notes_file="$(mktemp)"
          {
            printf 'RightClick Pro %s preview build.\n\n' "$version"
            printf 'Release DMG assets are built by GitHub Actions from tag %s.\n' "$GITHUB_REF_NAME"
          } > "$notes_file"

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "RightClick Pro ${version}" \
              --notes-file "$notes_file"
          fi
